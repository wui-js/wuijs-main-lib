<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WUIPaginator v0.1 - Example</title>
	<link rel="stylesheet" href="WUIPaginator-0.1.css">
	<style>
		:root {

			/* wui-paginator */

			--wui-paginator-gap: 8px;
			--wui-paginator-padding: 12px;
			--wui-paginator-bgcolor: #f5f5f5;
			--wui-paginator-borderradius: 8px;
			--wui-paginator-button-size: 36px;
			--wui-paginator-button-bordercolor-out: #d0d0d0;
			--wui-paginator-button-bordercolor-over: #a0a0a0;
			--wui-paginator-button-bordercolor-disabled: #e0e0e0;
			--wui-paginator-button-bordercolor-active: #2563eb;
			--wui-paginator-button-bgcolor-out: #ffffff;
			--wui-paginator-button-bgcolor-over: #f0f0f0;
			--wui-paginator-button-bgcolor-disabled: #f9f9f9;
			--wui-paginator-button-bgcolor-active: #2563eb;
			--wui-paginator-button-textcolor-out: #333333;
			--wui-paginator-button-textcolor-over: #000000;
			--wui-paginator-button-textcolor-disabled: #999999;
			--wui-paginator-button-textcolor-active: #ffffff;
			--wui-paginator-button-textsize: 14px;
			--wui-paginator-button-textweight: 500;
			--wui-paginator-button-borderradius: 6px;
			--wui-paginator-button-icon-size: 18px;
			--wui-paginator-button-icon-color-out: #333333;
			--wui-paginator-button-icon-color-over: #000000;
			--wui-paginator-button-icon-color-disabled: #999999;
			--wui-paginator-numbered-gap: 4px;
			--wui-paginator-select-bordercolor-out: #d0d0d0;
			--wui-paginator-select-bordercolor-over: #a0a0a0;
			--wui-paginator-select-bgcolor-out: #ffffff;
			--wui-paginator-select-bgcolor-over: #f0f0f0;
			--wui-paginator-select-textcolor-out: #333333;
			--wui-paginator-select-textcolor-over: #000000;
			--wui-paginator-select-textsize: 14px;
			--wui-paginator-select-borderradius: 6px;
			--wui-paginator-info-textcolor: #666666;
			--wui-paginator-info-textsize: 14px;
			--wui-paginator-info-textweight: 400;
			--wui-paginator-mobile-gap: 6px;
			--wui-paginator-mobile-padding: 10px;
			--wui-paginator-mobile-button-size: 32px;
			--wui-paginator-mobile-button-textsize: 13px;
			--wui-paginator-mobile-button-icon-size: 16px;
			--wui-paginator-mobile-numbered-gap: 3px;
			--wui-paginator-mobile-select-textsize: 13px;
			--wui-paginator-mobile-info-textsize: 13px;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			margin: 0;
			padding: 40px 20px;
			background-color: #fafafa;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
		}

		h1 {
			text-align: center;
			color: #333;
			margin-bottom: 40px;
		}

		.example {
			background-color: white;
			padding: 30px;
			margin-bottom: 30px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		}

		.example h2 {
			margin-top: 0;
			color: #555;
			font-size: 18px;
			margin-bottom: 20px;
		}

		.output {
			margin-top: 20px;
			padding: 15px;
			background-color: #f9f9f9;
			border-radius: 6px;
			font-family: monospace;
			font-size: 13px;
			color: #333;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>WUIPaginator v0.1 - Examples</h1>

		<div class="example">
			<h2>Example 1: Basic Paginator (Navigation buttons only)</h2>
			<div id="paginator1"></div>
			<div class="output" id="output1">Current page: 1</div>
		</div>

		<div class="example">
			<h2>Example 2: Paginator with Numbered Buttons</h2>
			<div id="paginator2"></div>
			<div class="output" id="output2">Current page: 1</div>
		</div>

		<div class="example">
			<h2>Example 3: Complete Paginator (All features)</h2>
			<div id="paginator3"></div>
			<div class="output" id="output3">Current page: 1 | Paging: 10</div>
		</div>

		<div class="example">
			<h2>Example 4: Custom Info Format</h2>
			<div id="paginator4"></div>
			<div class="output" id="output4">Current page: 1</div>
		</div>
	</div>

	<script src="WUIPaginator-0.1.js"></script>
	<script>
		const init = () => {
			// Example 1: Basic paginator
			const paginator1 = new WUIPaginator({
				selector: "#paginator1",
				currentPage: 1,
				totalPages: 10,
				totalRecords: 243,
				onChange: (newPage, oldPage) => {
					document.getElementById("output1").textContent =
						`Current page: ${newPage} (changed from ${oldPage})`;
				}
			});
			paginator1.init();

			// Example 2: With numbered buttons
			const paginator2 = new WUIPaginator({
				selector: "#paginator2",
				currentPage: 5,
				totalPages: 15,
				totalRecords: 350,
				numberedButtons: true,
				maxNumberedButtons: 7,
				info: "",
				onChange: (newPage, oldPage) => {
					document.getElementById("output2").textContent =
						`Current page: ${newPage} (changed from ${oldPage})`;
				}
			});
			paginator2.init();

			// Example 3: Complete paginator
			const paginator3 = new WUIPaginator({
				selector: "#paginator3",
				currentPage: 1,
				totalPages: 20,
				totalRecords: 485,
				numberedButtons: true,
				maxNumberedButtons: 5,
				paging: [
					{ value: 10, label: "10 per page" },
					{ value: 25, label: "25 per page" },
					{ value: 50, label: "50 per page" },
					{ value: 100, label: "100 per page" }
				],
				info: "Page p of t (r records)",
				onChange: (newPage, oldPage, pagingValue) => {
					let output = `Current page: ${newPage} (changed from ${oldPage})`;
					if (pagingValue !== undefined) {
						output += ` | Paging changed to: ${pagingValue}`;
					}
					document.getElementById("output3").textContent = output;
				}
			});
			paginator3.init();

			// Example 4: Custom info format
			const paginator4 = new WUIPaginator({
				selector: "#paginator4",
				currentPage: 3,
				totalPages: 8,
				totalRecords: 156,
				firstPageButton: false,
				lastPageButton: false,
				numberedButtons: true,
				info: "p / t páginas · r registros totales",
				onChange: (newPage, oldPage) => {
					document.getElementById("output4").textContent =
						`Current page: ${newPage} (changed from ${oldPage})`;
				}
			});
			paginator4.init();
		};

		window.addEventListener("DOMContentLoaded", init);
	</script>
</body>
</html>
